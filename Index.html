<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แนะนำตัว - ปภาวิน นะชม</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Tahoma", sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0d47a1, #42a5f5);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:#ffffff;
            width:90%;
            max-width:600px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#1565c0;
            margin-bottom:15px;
        }

        .position{
            color:#1976d2;
            font-size:20px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .info{
            text-align:left;
            margin-top:20px;
            line-height:2;
            font-size:18px;
        }

        .greeting{
            background:#e3f2fd;
            padding:15px;
            border-radius:10px;
            margin:20px 0;
            color:#0d47a1;
            font-size:18px;
        }

        .email{
            color:#1565c0;
            font-weight:bold;
        }

        footer{
            margin-top:20px;
            color:#666;
            font-size:14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>แนะนำตัว</h1>

        <div class="position">นักเรียนนักศึกษา</div>

        <div class="info">
            <p><strong>ชื่อ-นามสกุล:</strong> ปภาวิน นะชม</p>
            <p><strong>วิทยาลัย:</strong> เทคนิคภูเก็ต</p>
        </div>

        <div class="greeting">
            <p>Hello World</p>
            <p>สวัสดีชาวโลก</p>
        </div>

        <div class="info">
            <p><strong>อีเมล:</strong> <span class="email">Papawinnachom@gmail.com</span></p>
        </div>

        <footer>
            Phuket Technical College
        </footer>
    </div>

</body>
</html>
